<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metronome</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
      }
      body {
        max-width: 36rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      fieldset {
        border: 1px solid #ccc;
        border-radius: 8px;
        margin-bottom: 1rem;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        margin-bottom: 0.75rem;
      }
      #beatIndicator {
        height: 4rem;
        border-radius: 8px;
        border: 2px solid #333;
        background: #e8e8e8;
        transition: background-color 40ms ease-out;
      }
      #beatIndicator.beep-on {
        background: #22c55e;
      }
      #musicList {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      #musicList li {
        margin-bottom: 0.35rem;
      }
      .music-list-row {
        display: flex;
        gap: 0.35rem;
        align-items: stretch;
      }
      .music-list-row .music-open {
        flex: 1;
        min-width: 0;
        text-align: left;
        padding: 0.5rem 0.65rem;
      }
      .music-list-row .music-delete {
        flex: 0 0 auto;
        padding: 0.5rem 0.65rem;
      }
      .muted {
        color: #666;
        font-size: 0.9rem;
      }
      #prompterPanel {
        margin-top: 1rem;
      }
      .prompter-toolbar {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
        flex-wrap: wrap;
      }
      #lyricsViewport {
        max-height: 60vh;
        overflow: auto;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 0.25rem;
        scroll-behavior: smooth;
      }
      #controlsPanel {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .lyric-row {
        padding: 0.5rem 0.35rem;
        border-bottom: 1px solid #eee;
        cursor: pointer;
      }
      .lyric-row .lyric-desc {
        font-size: 0.8rem;
        color: #555;
      }
      .lyric-row .lyric-letra {
        margin-top: 0.15rem;
      }
      .lyric-row .lyric-cifra {
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        color: #333;
        margin-top: 0.15rem;
        white-space: pre-wrap;
      }
      .lyric-row.focused {
        font-size: 1.15rem;
        font-weight: 600;
        background: #f0f7ff;
      }
      .lyric-row.focused + .lyric-row {
        font-size: 1.15rem;
        font-weight: 600;
      }
      .lyric-row.focused + .lyric-row > .lyric-cifra {
        font-size: 1rem;
      }
      .lyric-row.focused .lyric-cifra {
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Metronome</h1>
    <fieldset id="controlsPanel">
      <legend>Controls</legend>
      <label>
        BPM
        <input id="tempo" type="number" min="30" max="300" value="120" />
      </label>
      <label>
        Compassos
        <input id="accent" type="number" min="1" max="32" value="4" />
      </label>
      <label>
        Counter
        <input id="counter" type="number" min="0" value="0" />
      </label>
      <button id="playPause" type="button">Play</button>
    </fieldset>
    <p>Beat</p>
    <div id="beatIndicator" aria-live="polite"></div>
    <fieldset>
      <legend>Musics (IndexedDB)</legend>
      <p id="syncStatus" class="muted">Loading CSVs…</p>
      <ul id="musicList"></ul>
    </fieldset>
    <fieldset id="prompterPanel" hidden>
      <legend>Prompter</legend>
      <p id="prompterTitle" class="muted"></p>
      <div class="prompter-toolbar">
        <button id="navUp" type="button" aria-label="Previous section">↑</button>
        <button id="navDown" type="button" aria-label="Next section">↓</button>
        <button id="closePiece" type="button">X</button>
      </div>
      <div id="lyricsViewport">
        <div id="lyricsRows"></div>
      </div>
    </fieldset>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
