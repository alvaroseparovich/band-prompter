<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metronome · Lyrics</title>
    <link rel="stylesheet" href="/ui-v2.css" />
  </head>
  <body class="ui-v2">
    <div class="v2-root">
      <aside class="v2-sidebar" aria-label="Controls and library">
        <h1>Metronome</h1>
        <fieldset id="controlsPanel">
          <legend>Controls</legend>
          <label>
            BPM
            <input id="tempo" type="number" min="30" max="300" value="120" style="width: 3em;"/>
          </label>
          <label>
            Comp
            <input id="accent" type="number" min="1" max="32" value="4" />
          </label>
          <label>
            Counter
            <input id="counter" type="number" min="0" value="0" style="width: 3em;"/>
          </label>
          <label class="tts-toggle">
            <input id="ttsEnabled" type="checkbox" checked />
            TTS
          </label>
          <button id="playPause" type="button">Play</button>
        </fieldset>
        <p class="v2-beat-label">Beat</p>
        <div id="beatIndicator" aria-live="polite"></div>
        <fieldset>
          <legend>Musics (IndexedDB)</legend>
          <p id="syncStatus" class="muted">Loading CSVs…</p>
          <div id="emptyLibraryActions" class="empty-library-actions" hidden>
            <button id="loadPresetBtn" type="button">Load preset data</button>
            <button id="showLoremBtn" type="button">Show lorem ipsum</button>
          </div>
          <ul id="musicList"></ul>
        </fieldset>
        <fieldset id="sheetsImportPanel">
          <legend>Import from Google Sheets</legend>
          <label>
            Sheet URL or ID
            <input
              id="sheetUrl"
              type="text"
              placeholder="https://docs.google.com/spreadsheets/d/.../edit"
            />
          </label>
          <label style="display: none;">
            Range
            <input id="sheetRange" type="text" value="A:G" />
          </label>
          <button id="sheetImportBtn" type="button">Import all tabs</button>
          <p id="sheetImportStatus" class="muted">
            Paste a Google Sheets URL and import all tabs.
          </p>
        </fieldset>
        <fieldset id="prompterPanel" class="v2-prompter-chrome" hidden>
          <legend>Prompter</legend>
          <p id="prompterTitle" class="muted"></p>
          <div class="prompter-toolbar">
            <button id="navUp" type="button" aria-label="Previous section">↑</button>
            <button id="navDown" type="button" aria-label="Next section">↓</button>
            <button id="closePiece" type="button">X</button>
          </div>
        </fieldset>
      </aside>
      <main class="v2-lyrics" aria-label="Lyrics">
        <p class="v2-lyrics-placeholder muted">Select a music from the sidebar to show lyrics here.</p>
        <div id="lyricsViewport">
          <div id="lyricsRows"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
